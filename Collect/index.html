<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Collect</title>
    <meta name="description" content="A MakeCode Arcade game" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000">
    <script src="../loader.js"></script>
    <style>
        body {
            background: black;
            color: white;
            font-family: monospace;
            overflow: hidden;
            margin: 0;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .lds-ripple {
            width: 80px;
            height: 80px;
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            margin: auto;
            z-index: -1;
        }
        .lds-ripple div {
            position: absolute;
            border: 4px solid #fff;
            opacity: 1;
            border-radius: 50%;
            animation: lds-ripple 1s cubic-bezier(0, 0.2, 0.8, 1) infinite;
        }
        .lds-ripple div:nth-child(2) {
            animation-delay: -0.5s;
        }
        @keyframes lds-ripple {
            0% {
                top: 36px;
                left: 36px;
                width: 0;
                height: 0;
                opacity: 1;
            }
            100% {
                top: 0;
                left: 0;
                width: 72px;
                height: 72px;
                opacity: 0;
            }
        }
    </style>
</head>
<body id="root">
    <div id="loader" class="lds-ripple">
        <div></div>
        <div></div>
    </div>
    <iframe id="simframe" allowfullscreen="allowfullscreen"
        sandbox="allow-popups allow-forms allow-scripts allow-same-origin">
    </iframe>
    <script>
        makeCodeRun({ js: "./binary.js", simUrl: "../simulator/index.html" });
    </script>
</body>
</html>
