<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>404</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- font css -->
    <style>
        @font-face {
            font-family: 'Press Start 2P';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('./PressStart2P.woff2') format('woff2');
        }
    </style>

    <!-- regular css -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #ccc;
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(transparent 0px,
                    transparent 3px,
                    rgba(0, 0, 0, 0.12) 3px,
                    rgba(0, 0, 0, 0.12) 4px);
            pointer-events: none;
        }

        .error-page {
            display: none;
            padding: 2rem;
        }

        .error-page.visible {
            display: block;
        }

        .code {
            font-size: 4rem;
            color: #ff2d78;
            text-shadow:
                0 0 10px rgba(255, 45, 120, 0.6),
                0 0 30px rgba(255, 45, 120, 0.3);
            margin-bottom: 1.5rem;
        }

        .msg {
            font-size: 0.7rem;
            color: #555;
            line-height: 2;
            margin-bottom: 2.5rem;
        }

        .skull {
            font-size: 0.45rem;
            color: #ff2d78;
            line-height: 1.2;
            margin-bottom: 2.5rem;
            opacity: 0.5;
        }

        .home-link {
            display: inline-block;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            color: #00e5ff;
            text-decoration: none;
            border: 2px solid #00e5ff;
            padding: 0.8rem 1.5rem;
            transition: all 0.15s;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
        }

        .home-link:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.25);
        }

        .blink {
            animation: blink 1s steps(1) infinite;
        }

        @keyframes blink {

            0%,
            55% {
                opacity: 1;
            }

            56%,
            100% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="error-page" id="error">
        <div class="code">404</div>
        <div class="skull">
            <pre style="font-size: large;">
    _______________
   /               \
  |  RIP            |
  |  THIS PAGE      |
  |  1993 - 2026    |
  |                 |
  |_________________|
        |   |
       \|/ \|/
   ^^^^^^^^^^^^^^^^^^^^
        </pre>
        </div>
        <div class="msg">
            GAME NOT FOUND<br>
            <span class="blink">PRESS CONTINUE TO RETURN</span>
        </div>
        <a href="../" class="home-link">CONTINUE</a>
    </div>

    <script>
        (function () {
            var path = location.pathname.split('/').filter(Boolean);
            var game = path[path.length - 1];

            // not a game path, go home
            if (!game || game.indexOf('.') !== -1) {
                location.replace('./');
                return;
            }

            // check if game exists by fetching its binary
            var base = location.pathname.substring(0, location.pathname.lastIndexOf('/' + game + '/') + 1);
            if (!base) base = '../';

            var xhr = new XMLHttpRequest();
            xhr.open('HEAD', base + game + '/binary.js', true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        // game exists, redirect to player
                        location.replace(base + 'game.html?g=' + game);
                    } else {
                        // game doesn't exist, show 404
                        document.getElementById('error').className = 'error-page visible';
                    }
                }
            };
            xhr.send();
        })();
    </script>
</body>

</html>
